---
# main playbook
- name: Main playbook for managing all servers
  hosts: "{{ target_hosts | default('labservers') }}"
  vars_files:
    - vars/main.yml
    - vars/secrets.yml

  tasks:
    - name: Include the role_apt
      ansible.builtin.include_role:
        name: role_apt
      when: is_update_upgrade | bool

    - name: Check if zsh is available
      ansible.builtin.stat:
        path: /usr/bin/zsh
      register: zsh_check

    - name: Grab current PATH environment variable (zsh)
      ansible.builtin.shell:
        cmd: source ~/.zshrc && echo $PATH
      args:
        executable: /usr/bin/zsh
      register: env_path_zsh
      changed_when: false
      when: zsh_check.stat.exists

    - name: Grab current PATH environment variable (fallback)
      ansible.builtin.shell:
        cmd: echo $PATH
      register: env_path_fallback
      changed_when: false
      when: not zsh_check.stat.exists

    - name: Set fact for env_path
      ansible.builtin.set_fact:
        env_path: "{{ (env_path_zsh.stdout if zsh_check.stat.exists else env_path_fallback.stdout) }}"
        cacheable: "yes"

    - name: Include the role_reboot
      ansible.builtin.include_role:
        name: role_reboot
      when: is_reboot | bool

    - name: Include the role_pip
      ansible.builtin.include_role:
        name: role_pip
      when: is_install_pip_packages | bool

    - name: Include the role_unattended_upgrade
      ansible.builtin.include_role:
        name: role_unattended_upgrade
      when: is_unattended_upgrade | bool

    - name: Include the role_docker
      ansible.builtin.include_role:
        name: role_docker
        apply:
          become: true
      vars: # noqa: var-naming[no-role-prefix]
        docker_users: "{{ current_users }}"
        docker_install_compose: false
        docker_install_compose_plugin: false
      when: is_install_docker | bool

    - name: Include the role_system_reporter
      ansible.builtin.include_role:
        name: role_system_reporter
      when: is_deploy_system_reporter | bool
